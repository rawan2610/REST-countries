<div class="min-h-screen bg-gray-100 dark:bg-slate-900 transition-colors">
  <!-- Header with title and theme toggle -->
  <div class="bg-white dark:bg-slate-800 shadow-md py-6 px-8 mb-8">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white">Where in the world?</h1>
      <app-toggle-theme></app-toggle-theme>
    </div>
  </div>

  <!-- Search and Filter Section -->
  <div class="px-8 max-w-7xl mx-auto w-full">
    <div class="flex flex-col gap-6 md:flex-row md:justify-between md:items-center mb-10">
      <app-search (searchTerm)="onSearch($event)"></app-search>

      <div class="w-48">
        <app-region-filter (regionChange)="onRegionChange($event)"></app-region-filter>
      </div>
    </div>
  </div>

  <!-- Countries Grid -->
  @if (countries().length) {
    <div class="grid grid-cols-1 gap-8 px-8 pb-8 md:grid-cols-2 lg:grid-cols-4 lg:max-w-7xl mx-auto">
      @for (country of countries(); track country.name.common) {
        <app-country-card [country]="country" />
      }
    </div>
  }
</div>
