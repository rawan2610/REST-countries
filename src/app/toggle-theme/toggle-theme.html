<div
  class="flex justify-between items-center px-8 py-6 shadow-md bg-white text-gray-900 dark:bg-slate-800 dark:text-white" transition-color
>
  <!--<h1 class="text-xl font-extrabold">Where in the world?</h1>-->
  <button
    (click)="themeService.toggleTheme()"
    class="flex items-center gap-2 px-4 py-2 dark:bg-gray-800 text-gray-800 dark:text-gray-50 transition transform hover:scale-105 "
  >
    @if (!themeService.darkMode()) {
      <span class="material-icons text-lg">light_mode</span>
      <span class="font-medium">Light Mode</span>
    }
    @if (themeService.darkMode()) {
      <span class="material-icons text-lg">dark_mode</span>
      <span class="font-medium">Dark Mode</span>
    }
  </button>
</div>
